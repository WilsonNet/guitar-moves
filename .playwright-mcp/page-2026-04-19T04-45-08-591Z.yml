            - list [ref=e2037]:
              - listitem [ref=e2038]: Start slowly (♩ = 60 bpm), gradually increase to ♩ = 100
              - listitem [ref=e2039]: "Use strict alternating fingering: i-m-i-m for scales"
              - listitem [ref=e2040]: Focus on clean string transitions
              - listitem [ref=e2041]: Let all notes ring clearly without buzzing
            - separator [ref=e2042]
