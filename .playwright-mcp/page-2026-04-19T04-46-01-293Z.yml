                  - strong [ref=e180]: "Posture:"
                  - text: Sit with the guitar on your left leg (classical position) or right leg (casual). Keep your back straight.
              - listitem [ref=e181]:
                - paragraph [ref=e182]:
                  - strong [ref=e183]: "Left Hand:"
                  - text: Keep fingers curved, fingertips pressing down just behind the frets. Thumb should be positioned behind the neck, roughly opposite the middle finger.
              - listitem [ref=e184]:
                - paragraph [ref=e185]:
                  - strong [ref=e186]: "Right Hand:"
                  - text: For these exercises, use free stroke ( Tirando ) for a lighter sound, or rest stroke ( Apoyando ) for a fuller, more pronounced tone.
              - listitem [ref=e187]:
                - paragraph [ref=e188]:
                  - strong [ref=e189]: "Timing:"
                  - text: Practice with a metronome. Speed will come naturally from accuracy.
              - listitem [ref=e190]:
